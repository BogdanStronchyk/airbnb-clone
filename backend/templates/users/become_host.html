{% extends 'base.html' %}

{% block title %}Become a Host - Airbnb Clone{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto mt-12 bg-white p-8 border border-gray-200 rounded-2xl shadow-sm">
    <h2 class="text-3xl font-bold mb-6 text-center">Become a Host Today</h2>
    <p class="text-gray-600 mb-8 text-center text-lg">Join our community of hosts and start earning by sharing your space.</p>
    
    <div class="flex justify-center">
        <form method="post" action="{% url 'become_host' %}">
            {% csrf_token %}
            <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 px-8 rounded-xl shadow-md transition text-xl">
                Activate Host Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
