{% extends 'base.html' %}

{% block title %}Sign up - Airbnb Clone{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 border border-gray-200 rounded-2xl shadow-sm">
    <h2 class="text-2xl font-bold mb-6 text-center">Welcome to Airbnb</h2>
    <form method="post" action="{% url 'register_page' %}">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="username" placeholder="Username" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
        </div>
        <div class="mb-4">
            <input type="email" name="email" placeholder="Email" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
        </div>
        <div class="mb-6">
            <input type="password" name="password" placeholder="Password" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
        </div>
        <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-lg transition">
            Sign up
        </button>
    </form>
    <div class="mt-6 text-center text-sm">
        <p>Already have an account? <a href="{% url 'login_page' %}" class="font-bold underline">Log in</a></p>
    </div>
</div>
{% endblock %}
