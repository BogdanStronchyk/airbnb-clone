{% extends 'base.html' %}

{% block title %}Edit Listing - Airbnb Clone{% endblock %}

{% block content %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 bg-white border border-gray-200 rounded-2xl shadow-sm">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Edit Listing</h1>
        <a href="{% url 'host_dashboard' %}" class="text-gray-500 hover:text-gray-800 font-semibold">Cancel</a>
    </div>

    <form method="post" action="{% url 'edit_listing' listing.pk %}" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Column: Basic Info -->
            <div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Title</label>
                    <input type="text" name="title" value="{{ listing.title }}" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Category</label>
                    <select name="category" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
                        <option value="">Select Category</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}" {% if listing.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Description</label>
                    <textarea name="description" required rows="5" class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">{{ listing.description }}</textarea>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Price ($)</label>
                    <div class="flex gap-2">
                        <input type="number" step="0.01" name="base_price" value="{{ listing.base_price }}" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black" placeholder="Amount">
                        <select name="pricing_type" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
                            {% for value, label in pricing_types %}
                                <option value="{{ value }}" {% if listing.pricing_type == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Upload New Images</label>
                    <input type="file" name="images" multiple accept="image/*" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-black">
                    <p class="text-sm text-gray-500 mt-1">Leave empty to keep existing images.</p>
                </div>
            </div>
            
            <!-- Right Column: Location & Map -->
            <div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Address/Location Name</label>
                    <input type="text" name="location" id="location-input" value="{{ listing.location }}" required class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-black">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Pinpoint on Map</label>
                    <p class="text-sm text-gray-500 mb-2">Click on the map to set the exact location.</p>
                    <div id="map" class="h-64 w-full rounded-lg border border-gray-300 z-10"></div>
                </div>
                
                <input type="hidden" name="latitude" id="latitude" value="{{ listing.latitude|default_if_none:'' }}">
                <input type="hidden" name="longitude" id="longitude" value="{{ listing.longitude|default_if_none:'' }}">
            </div>
        </div>
        
        <div class="mt-8 border-t border-gray-200 pt-6">
            <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition float-right">
                Save Changes
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const initLat = document.getElementById('latitude').value ? parseFloat(document.getElementById('latitude').value) : 40.7128;
        const initLng = document.getElementById('longitude').value ? parseFloat(document.getElementById('longitude').value) : -74.0060;
        
        const map = L.map('map').setView([initLat, initLng], document.getElementById('latitude').value ? 13 : 3);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        let marker;
        
        if (document.getElementById('latitude').value && document.getElementById('longitude').value) {
            marker = L.marker([initLat, initLng]).addTo(map);
        }
        
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
            
            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lng]).addTo(map);
        });
    });
</script>
{% endblock %}
